services:
  - type: web
    name: resume-tailor
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: DRIVE_FOLDER_ID
        sync: false
      - key: OAUTH_CLIENT_B64
        sync: false
